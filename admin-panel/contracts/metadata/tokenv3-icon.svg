  <text x="100" y="95" font-family="monospace" font-size="28" font-weight="bold" fill="#e2d9f3" text-anchor="middle" dominant-baseline="middle">V3</text>
  <text x="100" y="122" font-family="monospace" font-size="11" fill="#a855f7" text-anchor="middle" letter-spacing="3">TOKEN</text>
  <!-- Corner dots -->
