<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="80" fill="url(#glow)"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.8"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <!-- Hexagon shape -->
  <polygon points="100,38 148,65 148,119 100,146 52,119 52,65" fill="none" stroke="#a855f7" stroke-width="2.5" opacity="0.9"/>
