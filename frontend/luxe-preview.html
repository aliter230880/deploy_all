<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Smart Contract Deployment Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #4A90E2, #9013FE);
            color: white;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        select, input {
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            outline: none;
            font-size: 1rem;
        }
        button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #4A90E2;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #f0f0f0;
        }
        form {
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div>
        <h1>Deploy Your Smart Contract</h1>
        <form>
            <label for="network">Select Network:</label><br>
            <select id="network" name="network">
                <option value="ethereum">Ethereum</option>
                <option value="polygon">Polygon</option>
                <option value="binance-smart-chain">Binance Smart Chain</option>
            </select><br>
            <label for="contract">Smart Contract:</label><br>
            <input type="text" id="contract" name="contract" placeholder="Enter contract address" required><br>
            <button type="submit">Deploy Contract</button>
        </form>
    </div>
</body>
</html>
