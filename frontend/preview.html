<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Smart Contract Deployment Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, rgba(2,0,36,1) 0%, rgba(9,121,196,1) 35%, rgba(0,212,255,1) 100%); }
        .feature-card { border: none; border-radius: 15px; transition: transform 0.2s; }
        .feature-card:hover { transform: scale(1.05); }
        .dashboard { margin-top: 20px; }
        .responsive-form { display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Web3 Deploy</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="responsive-form">
            <h2>Deploy Your Smart Contract</h2>
            <form id="deployForm">
                <div class="mb-3">
                    <label for="networkSelector" class="form-label">Select Network</label>
                    <select class="form-select" id="networkSelector">
                        <option value="mainnet">Mainnet</option>
                        <option value="testnet">Testnet</option>
                        <option value="local">Local</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="fileUpload" class="form-label">Upload Smart Contract File</label>
                    <input class="form-control" type="file" id="fileUpload" required>
                </div>
                <button type="submit" class="btn btn-primary">Deploy</button>
            </form>
        </div>

        <div class="dashboard">
            <h3>Dashboard</h3>
            <div class="row">
                <div class="col-md-4">
                    <div class="card feature-card">
                        <div class="card-body">
                            <h5 class="card-title">Feature 1</h5>
                            <p class="card-text">Description for feature 1.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card feature-card">
                        <div class="card-body">
                            <h5 class="card-title">Feature 2</h5>
                            <p class="card-text">Description for feature 2.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card feature-card">
                        <div class="card-body">
                            <h5 class="card-title">Feature 3</h5>
                            <p class="card-text">Description for feature 3.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
